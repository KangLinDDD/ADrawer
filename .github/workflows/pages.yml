name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build dist for demo
        run: |
          npm ci
          npm run build

      - name: Prepare demo files
        run: |
          mkdir -p _site
          # English version as main page
          cp examples/basic-en.html _site/index.html
          # Chinese version
          cp examples/basic.html _site/zh.html
          cp -r dist _site/
          # Update paths in demo files
          sed -i 's|../dist/index.esm.js|./dist/index.esm.js|g' _site/index.html
          sed -i 's|../dist/index.esm.js|./dist/index.esm.js|g' _site/zh.html
          # Update language switch links
          sed -i 's|./basic.html|./zh.html|g' _site/index.html
          sed -i 's|./basic-en.html|./index.html|g' _site/zh.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
