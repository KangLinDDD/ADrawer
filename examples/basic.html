<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Annotation Drawer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 20px; background: #f5f5f5; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { margin-bottom: 20px; }
    .toolbar { margin-bottom: 20px; padding: 15px; background: white; border-radius: 8px; }
    .toolbar button { padding: 10px 20px; margin-right: 10px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; }
    .toolbar button:hover { background: #f0f0f0; }
    .toolbar button.active { background: #007bff; color: white; border-color: #007bff; }
    #canvas-container { width: 800px; height: 600px; border: 2px solid #ddd; border-radius: 8px; background: white; margin-bottom: 20px; }
    .help { padding: 15px; background: white; border-radius: 8px; }
    .help h3 { margin-bottom: 10px; }
    .help li { margin: 5px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Image Annotation Drawer</h1>
    
    <div class="toolbar">
      <button onclick="setMode('rect')" id="btn-rect">矩形标注</button>
      <button onclick="setMode('polygon')" id="btn-polygon">多边形标注</button>
      <button onclick="setMode('text')" id="btn-text">文本标注</button>
      <button onclick="setMode('drag')" id="btn-drag">拖拽视图</button>
      <button onclick="drawer.withdraw()">撤销</button>
      <button onclick="drawer.clearCanvas(); drawer.drawImage('https://picsum.photos/800/600');">清除</button>
    </div>

    <div id="canvas-container"></div>

    <div class="help">
      <h3>使用说明：</h3>
      <ul>
        <li><strong>矩形/多边形/文本模式</strong>：创建新的标注</li>
        <li><strong>不选择任何模式</strong>（再次点击当前模式按钮取消）：
          <ul>
            <li>点击矩形/多边形：选中并可以拖拽移动</li>
            <li>点击矩形控制点：调整大小</li>
            <li>点击多边形顶点：调整形状</li>
            <li>点击文本：编辑内容</li>
            <li>按 Delete 删除选中标注</li>
          </ul>
        </li>
        <li><strong>ESC</strong>：取消选中/取消编辑</li>
      </ul>
    </div>
  </div>

  <script src="../dist/index.js"></script>
  <script>
    const drawer = new ImageAnnotationDrawer({
      id: 'canvas-container',
      drawType: 'rect'
    });

    // 加载示例图片
    drawer.drawImage('https://picsum.photos/800/600');

    function setMode(mode) {
      // 如果点击当前模式，则取消选择（进入无模式状态）
      if (drawer.drawType === mode) {
        drawer.setDrawType('');
        document.querySelectorAll('.toolbar button').forEach(btn => btn.classList.remove('active'));
      } else {
        drawer.setDrawType(mode);
        document.querySelectorAll('.toolbar button').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + mode).classList.add('active');
      }
    }

    // 初始状态
    document.getElementById('btn-rect').classList.add('active');
  </script>
</body>
</html>
